<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Harian — Warung Makan Pak Kris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Rekap Harian</h1>
            <p>Ringkasan Penjualan & Pendapatan</p>
            <nav class="topnav">
                <a href="index.html">🍽️ Menu</a>
                <a href="rekap.html" class="active">📊 Rekap Harian</a>
            </nav>
        </div>
    </header>

    <main class="container rekap-page">
        <section class="rekap-controls no-print">
            <label for="datePick">Pilih Tanggal:</label>
            <input type="date" id="datePick">
            <button id="exportBtn">⬇️ Export CSV</button>
            <button id="printRekapBtn">🖨️ Cetak Rekap</button>
            <button id="clearBtn" class="danger">🗑️ Hapus Data Tanggal Ini</button>
        </section>

        <section class="summary-grid" id="summaryGrid"></section>

        <section class="rekap-table-wrap">
            <h2>Daftar Transaksi</h2>
            <div id="trxList"></div>
        </section>

        <section class="rekap-table-wrap">
            <h2>Item Terlaris</h2>
            <div id="topItems"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Warung Makan Pak Kris. Enake Pollll.</p>
    </footer>

    <script src="rekap.js"></script>
</body>
</html>
